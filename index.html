<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Koronis Jeopardy!</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #071410;
  color: #fff;
  font-family: 'Roboto Condensed', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Starfield ── */
#starfield {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── Forest silhouette ── */
#forest-bg {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 180px;
  pointer-events: none;
  z-index: 1;
  opacity: 0.35;
}

/* ── Header ── */
#header {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 0.55rem 1rem 0.45rem;
  background: linear-gradient(180deg, #020a06 0%, #071410 100%);
  border-bottom: 3px solid #d4a017;
  -webkit-app-region: drag;
  flex-shrink: 0;
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
}
.header-trees {
  opacity: 0.7;
  flex-shrink: 0;
}
.header-text { flex-shrink: 0; }
#header .camp-name {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(0.65rem, 1.4vw, 0.9rem);
  letter-spacing: 0.45em;
  text-transform: uppercase;
  color: #7ec87e;
  text-shadow: 0 0 12px #2a6a2a;
}
#header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.5rem, 3.2vw, 2.5rem);
  letter-spacing: 0.04em;
  color: #f5d252;
  text-shadow: 0 0 30px #c8960080, 0 2px 0 #6b4e00;
  font-style: italic;
  line-height: 1.05;
}
#header p {
  font-size: 0.72rem;
  color: #5a9a5a;
  margin-top: 0.1rem;
  font-family: 'Roboto Condensed', sans-serif;
  letter-spacing: 0.05em;
  -webkit-app-region: no-drag;
}

/* ── Main layout ── */
#main {
  position: relative;
  z-index: 10;
  display: flex;
  gap: 0.6rem;
  padding: 0.6rem;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── Board ── */
#board-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; }
#board { display: grid; gap: 5px; flex: 1; }

.cat-cell {
  background: linear-gradient(180deg, #1e3fa0 0%, #0e2468 100%);
  border: 2px solid #3050c0;
  border-radius: 6px;
  padding: 0.5rem 0.3rem;
  text-align: center;
  font-family: 'Oswald', sans-serif;
  font-size: clamp(0.48rem, 1vw, 0.68rem);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1.2;
  text-shadow: 0 1px 4px #00000090;
}

.clue-cell {
  background: linear-gradient(180deg, #1e3fa0 0%, #0e2468 100%);
  border: 2px solid #3050c0;
  border-radius: 6px;
  text-align: center;
  font-family: 'Oswald', sans-serif;
  font-size: clamp(0.85rem, 1.8vw, 1.4rem);
  font-weight: 700;
  color: #f5d252;
  text-shadow: 0 0 12px #c8960060, 0 1px 4px #00000090;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  transition: background 0.12s, transform 0.12s, box-shadow 0.12s;
  position: relative;
  overflow: hidden;
}
.clue-cell::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, #ffffff0a 0%, transparent 70%);
  pointer-events: none;
}
.clue-cell:hover:not(.used) {
  background: linear-gradient(180deg, #2e52cc 0%, #1a35a8 100%);
  transform: scale(1.04);
  box-shadow: 0 0 20px #d4a01750, 0 4px 12px #00000060;
  border-color: #d4a017;
}
.clue-cell.used {
  background: #040c08;
  color: #040c08;
  cursor: default;
  border-color: #0a1a10;
  box-shadow: none;
}

/* flip reveal animation */
@keyframes flipIn {
  0% { transform: rotateY(90deg) scale(0.85); opacity: 0; }
  60% { transform: rotateY(-8deg) scale(1.02); }
  100% { transform: rotateY(0deg) scale(1); opacity: 1; }
}
.clue-cell.flipping { animation: flipIn 0.4s ease-out; }

/* ── Right sidebar ── */
#sidebar {
  width: 270px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  overflow: hidden;
}

/* ── 3D Host Panel ── */
#host-panel {
  flex: 1;
  min-height: 0;
  background: #050f07;
  border: 2px solid #1a4a1a;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}
#host-canvas { width: 100%; height: 100%; display: block; }
#host-label {
  position: absolute;
  bottom: 8px;
  left: 0; right: 0;
  text-align: center;
  font-size: 0.6rem;
  color: #2a6a2a;
  font-family: 'Oswald', sans-serif;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  pointer-events: none;
}

/* ── Scoreboard ── */
#scoreboard {
  flex-shrink: 0;
  background: linear-gradient(180deg, #080f08 0%, #060b24 100%);
  border: 2px solid #d4a017;
  border-radius: 8px;
  padding: 0.6rem;
}
#scoreboard h2 {
  text-align: center;
  font-family: 'Oswald', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  color: #f5d252;
  text-transform: uppercase;
  border-bottom: 1px solid #d4a01760;
  padding-bottom: 0.4rem;
  margin-bottom: 0.55rem;
}
.player-row {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 0.35rem;
  background: #0e1e6a;
  border-radius: 6px;
  padding: 0.3rem 0.4rem;
  border: 1px solid transparent;
  transition: border-color 0.15s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
}
.player-row.active-player {
  background: #162060;
  border-color: #f5d252;
  box-shadow: 0 0 10px #f5d25228, inset 0 0 8px #f5d25210;
}
.player-name {
  flex: 1;
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 0.72rem;
  color: #b0c0ff;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  letter-spacing: 0.02em;
}
.player-name:hover { color: #fff; }
.player-score {
  font-family: 'Oswald', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  color: #f5d252;
  min-width: 52px;
  text-align: right;
  transition: color 0.3s;
}
.player-score.negative { color: #ff7070; }
.score-btn {
  background: none;
  border: 1px solid #2a3a7a;
  border-radius: 3px;
  color: #7080c0;
  cursor: pointer;
  font-size: 0.65rem;
  width: 17px;
  height: 17px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  flex-shrink: 0;
  -webkit-app-region: no-drag;
  transition: background 0.12s;
}
.score-btn:hover { background: #2a3aaa; color: #fff; border-color: #4060cc; }
.del-btn { color: #944; border-color: #622; }
.del-btn:hover { background: #511; color: #f88; }

#add-player-area { margin-top: 0.55rem; }
#add-player-area input {
  width: 100%;
  background: #040c08;
  border: 1px solid #1a4a1a;
  border-radius: 4px;
  color: #fff;
  padding: 0.28rem 0.4rem;
  font-size: 0.72rem;
  margin-bottom: 0.3rem;
  font-family: 'Roboto Condensed', sans-serif;
  -webkit-app-region: no-drag;
  transition: border-color 0.15s;
}
#add-player-area input:focus { outline: none; border-color: #d4a017; }
#add-player-area input::placeholder { color: #2a5a2a; }
#add-player-btn {
  width: 100%;
  background: linear-gradient(180deg, #d4a017 0%, #a07800 100%);
  border: none;
  border-radius: 4px;
  color: #040c00;
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 0.72rem;
  padding: 0.28rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  -webkit-app-region: no-drag;
  transition: filter 0.12s;
}
#add-player-btn:hover { filter: brightness(1.2); }

#scoreboard-footer {
  margin-top: 0.5rem;
  border-top: 1px solid #1a3a1a;
  padding-top: 0.4rem;
  font-size: 0.6rem;
  color: #2a5a2a;
  text-align: center;
  font-family: 'Roboto Condensed', sans-serif;
  letter-spacing: 0.05em;
}

/* ── Bottom bar ── */
#bottom-bar {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 0.35rem 1rem 0.45rem;
  flex-shrink: 0;
}
#reset-btn {
  background: none;
  border: 1px solid #1a3a1a;
  border-radius: 4px;
  color: #2a5a2a;
  font-size: 0.68rem;
  padding: 0.28rem 0.7rem;
  cursor: pointer;
  font-family: 'Roboto Condensed', sans-serif;
  letter-spacing: 0.05em;
  -webkit-app-region: no-drag;
  transition: border-color 0.15s, color 0.15s;
}
#reset-btn:hover { border-color: #c44; color: #c44; }

/* ── Clue Modal ── */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  display: none;
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 1rem;
  backdrop-filter: blur(4px);
}
#overlay.open { display: flex; }

#modal {
  background: linear-gradient(160deg, #0e2468 0%, #060b24 60%, #071410 100%);
  border: 3px solid #d4a017;
  border-radius: 14px;
  padding: 2rem 2.5rem;
  max-width: 720px;
  width: 100%;
  text-align: center;
  position: relative;
  box-shadow: 0 0 60px #d4a01730, 0 20px 60px #00000080;
  animation: modalPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalPop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
#modal-cat {
  font-family: 'Oswald', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #7090ff;
  margin-bottom: 0.3rem;
}
#modal-value {
  font-family: 'Oswald', sans-serif;
  font-size: 2.2rem;
  font-weight: 700;
  color: #f5d252;
  text-shadow: 0 0 20px #c8960080;
  margin-bottom: 1.2rem;
  letter-spacing: 0.05em;
}
#modal-clue {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.1rem, 2.4vw, 1.6rem);
  color: #fff;
  line-height: 1.55;
  margin-bottom: 1.5rem;
  min-height: 3em;
  text-shadow: 0 1px 4px #00000060;
}
#modal-answer {
  background: #051a08;
  border: 1px solid #2a7a2a;
  border-radius: 8px;
  padding: 0.8rem 1.2rem;
  margin-bottom: 1.4rem;
  display: none;
  animation: fadeSlide 0.35s ease-out;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
#modal-answer.visible { display: block; }
.modal-answer-label {
  font-family: 'Oswald', sans-serif;
  font-size: 0.65rem;
  color: #4a8a4a;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 0.25rem;
}
#answer-text {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(1rem, 2.2vw, 1.5rem);
  font-weight: 600;
  color: #7eff9a;
  text-shadow: 0 0 16px #00ff4440;
  letter-spacing: 0.03em;
}

#modal-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
.modal-btn {
  padding: 0.5rem 1.3rem;
  border-radius: 7px;
  border: 2px solid;
  font-family: 'Oswald', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: filter 0.12s, transform 0.1s;
}
.modal-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
.modal-btn:active { transform: translateY(0); }
#reveal-btn { background: #d4a017; border-color: #d4a017; color: #040800; }
#close-btn  { background: #0e1a4a; border-color: #3050a0; color: #a0b0ff; }

#award-section { margin-top: 1.1rem; display: none; }
#award-section.visible { display: block; }
#award-section p {
  font-family: 'Oswald', sans-serif;
  font-size: 0.72rem;
  color: #7090c0;
  margin-bottom: 0.5rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
#award-buttons { display: flex; gap: 0.35rem; flex-wrap: wrap; justify-content: center; }
.award-row { display: flex; gap: 5px; align-items: center; margin-bottom: 5px; }
.award-name {
  font-family: 'Roboto Condensed', sans-serif;
  font-size: 0.75rem;
  color: #b0c0ff;
  min-width: 80px;
  text-align: left;
  font-weight: 700;
}
.award-btn {
  padding: 0.3rem 0.7rem;
  border-radius: 5px;
  border: 1px solid;
  font-family: 'Oswald', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: filter 0.12s, transform 0.1s;
}
.award-btn:hover { filter: brightness(1.2); transform: scale(1.05); }
.award-btn.correct  { border-color: #3c3; color: #3c3; background: #0a200a; }
.award-btn.wrong    { border-color: #c33; color: #c33; background: #200a0a; }

/* ── Floating score popup ── */
.score-pop {
  position: fixed;
  font-family: 'Oswald', sans-serif;
  font-size: 1.6rem;
  font-weight: 700;
  pointer-events: none;
  z-index: 999;
  animation: scorePop 1.2s ease-out forwards;
}
@keyframes scorePop {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
}

/* ── Confetti canvas ── */
#confetti-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 998;
}

/* ── Daily Double ── */
#dd-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.96);
  display: none;
  z-index: 200;
  justify-content: center;
  align-items: center;
  cursor: pointer;
}
#dd-overlay.open { display: flex; }
#dd-box { text-align: center; }
#dd-box h2 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(3rem, 9vw, 7rem);
  color: #f5d252;
  text-shadow: 0 0 50px #c89600, 0 0 100px #c8960060;
  font-style: italic;
  letter-spacing: 0.03em;
  animation: ddGlow 1.5s ease-in-out infinite alternate;
}
@keyframes ddGlow {
  from { text-shadow: 0 0 30px #c89600, 0 0 60px #c8960060; }
  to   { text-shadow: 0 0 60px #ffcc00, 0 0 120px #ffcc0080; }
}
.dd-stars {
  font-size: 1.4rem;
  color: #d4a017;
  letter-spacing: 1rem;
  margin-top: 0.5rem;
  animation: ddPop 0.6s ease-out;
}
@keyframes ddPop {
  from { transform: scale(0.2) rotate(-20deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg); opacity: 1; }
}
#dd-box p {
  color: #4a6a4a;
  font-size: 0.85rem;
  margin-top: 1rem;
  font-family: 'Roboto Condensed', sans-serif;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ── Edit button ── */
#edit-btn {
  position: fixed;
  bottom: 0.7rem;
  right: 0.7rem;
  background: #0e1a4a;
  border: 1px solid #2a3a8a;
  color: #7090c0;
  font-family: 'Oswald', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.35rem 0.75rem;
  border-radius: 5px;
  cursor: pointer;
  z-index: 50;
  transition: border-color 0.15s, color 0.15s;
}
#edit-btn:hover { border-color: #d4a017; color: #f5d252; }

/* ── Edit Modal ── */
#edit-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.94);
  display: none;
  z-index: 300;
  justify-content: center;
  align-items: flex-start;
  overflow-y: auto;
  padding: 1.5rem 1rem;
  backdrop-filter: blur(4px);
}
#edit-overlay.open { display: flex; }
#edit-modal {
  background: linear-gradient(160deg, #080f24 0%, #040c08 100%);
  border: 2px solid #d4a017;
  border-radius: 12px;
  padding: 1.5rem;
  max-width: 900px;
  width: 100%;
  font-family: 'Roboto Condensed', sans-serif;
}
#edit-modal h2 {
  font-family: 'Oswald', sans-serif;
  color: #f5d252;
  margin-bottom: 1rem;
  font-size: 1.2rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.edit-category-block { margin-bottom: 1.5rem; border-top: 1px solid #1a3a1a; padding-top: 1rem; }
.edit-category-block:first-child { border-top: none; padding-top: 0; }
.edit-category-block label {
  font-size: 0.65rem;
  color: #7090c0;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  display: block;
  margin-bottom: 0.2rem;
}
.edit-category-block input[type="text"] {
  width: 100%;
  background: #040c18;
  border: 1px solid #2a3a6a;
  border-radius: 4px;
  color: #fff;
  padding: 0.32rem 0.45rem;
  font-size: 0.88rem;
  margin-bottom: 0.6rem;
  font-family: 'Oswald', sans-serif;
  transition: border-color 0.15s;
}
.edit-category-block input[type="text"]:focus { outline: none; border-color: #d4a017; }
.edit-col-labels {
  display: grid;
  grid-template-columns: 55px 1fr 1fr 75px;
  gap: 5px;
  margin-bottom: 3px;
}
.edit-col-label { font-size: 0.6rem; color: #3a5a5a; text-align: center; letter-spacing: 0.05em; text-transform: uppercase; }
.edit-row { display: grid; grid-template-columns: 55px 1fr 1fr 75px; gap: 5px; align-items: center; margin-bottom: 4px; }
.edit-row span {
  font-family: 'Oswald', sans-serif;
  color: #f5d252;
  font-size: 0.78rem;
  font-weight: 700;
  text-align: center;
}
.edit-row input {
  background: #040c18;
  border: 1px solid #1a2a5a;
  border-radius: 4px;
  color: #fff;
  padding: 0.26rem 0.38rem;
  font-size: 0.78rem;
  width: 100%;
  font-family: 'Roboto Condensed', sans-serif;
  transition: border-color 0.15s;
}
.edit-row input:focus { outline: none; border-color: #5070cc; }
.edit-row select {
  background: #040c18;
  border: 1px solid #1a2a5a;
  border-radius: 4px;
  color: #f5d252;
  padding: 0.26rem 0.3rem;
  font-size: 0.72rem;
  font-family: 'Oswald', sans-serif;
}
.edit-actions { display: flex; gap: 0.5rem; margin-top: 1.2rem; }
.edit-save-btn {
  background: linear-gradient(180deg, #d4a017 0%, #a07800 100%);
  border: none;
  border-radius: 6px;
  color: #040800;
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  padding: 0.5rem 1.4rem;
  cursor: pointer;
  font-size: 0.9rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: filter 0.12s;
}
.edit-save-btn:hover { filter: brightness(1.2); }
.edit-cancel-btn {
  background: none;
  border: 1px solid #2a3a6a;
  border-radius: 6px;
  color: #7090c0;
  padding: 0.5rem 1rem;
  cursor: pointer;
  font-size: 0.85rem;
  font-family: 'Roboto Condensed', sans-serif;
  transition: border-color 0.15s;
}
.edit-cancel-btn:hover { border-color: #c44; color: #c44; }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<canvas id="confetti-canvas"></canvas>

<!-- Forest SVG silhouette -->
<svg id="forest-bg" viewBox="0 0 1400 180" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
  <g fill="#1a4a1a">
    <polygon points="70,180 100,80 130,180"/><polygon points="80,180 100,60 120,180"/>

<script>
// ── Game Data ──
const DEFAULT_DATA = {

    ]},
  ]
};

const VALUES = [200, 400, 600, 800, 1000];
let gameData = JSON.parse(JSON.stringify(DEFAULT_DATA));
let usedCells = {};
let players = [];
let activePlayer = null;
let currentClue = null;

// ── Storage ──
function save() {
  try {
    localStorage.setItem('jeopardy_data', JSON.stringify(gameData));
    localStorage.setItem('jeopardy_used', JSON.stringify(usedCells));
    localStorage.setItem('jeopardy_players', JSON.stringify(players));
    localStorage.setItem('jeopardy_active', activePlayer);
  } catch(e) {}
}
function load() {
  try {
    const d = localStorage.getItem('jeopardy_data');
    if (d) gameData = JSON.parse(d);
    const u = localStorage.getItem('jeopardy_used');
    if (u) usedCells = JSON.parse(u);
    const p = localStorage.getItem('jeopardy_players');
    if (p) players = JSON.parse(p);
    const a = localStorage.getItem('jeopardy_active');
    if (a && a !== 'null') activePlayer = a;
  } catch(e) {}
}

// ── Audio (Web Audio API synth) ──
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, duration, gainVal, delay=0) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(gainVal, ctx.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + duration);
  } catch(e) {}
}
function soundClick() {
  playTone(440, 'sine', 0.12, 0.15);
  playTone(660, 'sine', 0.08, 0.1, 0.05);
}
function soundReveal() {
  playTone(523, 'sine', 0.15, 0.12);
  playTone(659, 'sine', 0.15, 0.12, 0.1);
  playTone(784, 'sine', 0.3, 0.12, 0.2);
}
function soundCorrect() {
  playTone(523, 'sine', 0.1, 0.18);
  playTone(659, 'sine', 0.1, 0.18, 0.1);
  playTone(784, 'sine', 0.1, 0.18, 0.2);
  playTone(1047,'sine', 0.4, 0.2, 0.3);
}
function soundWrong() {
  playTone(200, 'sawtooth', 0.25, 0.2);
  playTone(150, 'sawtooth', 0.25, 0.2, 0.2);
}
function soundDailyDouble() {
  [523,659,784,1047,1319].forEach((f,i) => playTone(f,'sine',0.18,0.2,i*0.12));
}

// ── Starfield ──
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({length: 180}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.3 + 0.2,
      a: Math.random(),
      speed: Math.random() * 0.008 + 0.002,
      phase: Math.random() * Math.PI * 2
    }));
  }
  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = s.a * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,220,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();

// ── Confetti ──
const confettiCanvas = document.getElementById('confetti-canvas');
const confettiCtx = confettiCanvas.getContext('2d');
confettiCanvas.width = window.innerWidth;
confettiCanvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
});
let confettiParticles = [];
function launchConfetti() {
  const colors = ['#f5d252','#7eff9a','#60aaff','#ff7070','#ff9f40','#ff70d0'];
  for (let i = 0; i < 80; i++) {
    confettiParticles.push({
      x: window.innerWidth / 2 + (Math.random()-0.5)*400,
      y: window.innerHeight * 0.4,
      vx: (Math.random()-0.5)*10,
      vy: -Math.random()*8 - 4,
      r: Math.random()*5+3,
      color: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random()*360,
      rotV: (Math.random()-0.5)*8,
      life: 1
    });
  }
  animateConfetti();
}
function animateConfetti() {
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiParticles = confettiParticles.filter(p => p.life > 0);
  confettiParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.3;
    p.rot += p.rotV; p.life -= 0.012;
    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rot * Math.PI/180);
    confettiCtx.globalAlpha = Math.max(0, p.life);
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
    confettiCtx.restore();
  });
  if (confettiParticles.length > 0) requestAnimationFrame(animateConfetti);
}

// ── Floating score indicator ──
function showScorePop(delta, x, y) {
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.textContent = (delta > 0 ? '+' : '') + '$' + Math.abs(delta).toLocaleString();
  el.style.color = delta > 0 ? '#7eff9a' : '#ff7070';
  el.style.left = (x - 40) + 'px';
  el.style.top = (y - 20) + 'px';
  el.style.textShadow = `0 0 12px ${delta > 0 ? '#00ff44' : '#ff2200'}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

// ── Board ──
function buildBoard() {
  const board = document.getElementById('board');
  const cols = gameData.categories.length;
  board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  board.innerHTML = '';
  gameData.categories.forEach(cat => {
    const cell = document.createElement('div');
    cell.className = 'cat-cell';
    cell.textContent = cat.name;
    board.appendChild(cell);
  });
  VALUES.forEach((val, ri) => {
    gameData.categories.forEach((cat, ci) => {
      const key = `${ci}-${ri}`;
      const cell = document.createElement('div');
      cell.className = 'clue-cell' + (usedCells[key] ? ' used' : '');
      cell.textContent = usedCells[key] ? '' : `$${val.toLocaleString()}`;
      cell.dataset.cat = ci; cell.dataset.row = ri;
      if (!usedCells[key]) {
        cell.addEventListener('click', () => {
          cell.classList.add('flipping');
          setTimeout(() => cell.classList.remove('flipping'), 400);
          soundClick();
          openClue(ci, ri);
        });
      }
      board.appendChild(cell);
    });
  });
}

// ── Clue Modal ──
function openClue(ci, ri) {
  const cat = gameData.categories[ci];
  const clue = cat.clues[ri];
  const val = VALUES[ri];
  const key = `${ci}-${ri}`;
  currentClue = { ci, ri, val, key };
  if (clue.dd) {
    soundDailyDouble();
    showDailyDouble(() => openModal(cat, clue, val));
  } else {
    openModal(cat, clue, val);
  }
}

function openModal(cat, clue, val) {
  document.getElementById('modal-cat').textContent = cat.name;
  document.getElementById('modal-value').textContent = `$${val.toLocaleString()}`;
  document.getElementById('modal-clue').textContent = clue.q;
  document.getElementById('answer-text').textContent = clue.a;
  document.getElementById('modal-answer').classList.remove('visible');
  document.getElementById('award-section').classList.remove('visible');
  document.getElementById('reveal-btn').style.display = '';
  buildAwardButtons(val);
  document.getElementById('overlay').classList.add('open');
}

function buildAwardButtons(val) {
  const container = document.getElementById('award-buttons');
  container.innerHTML = '';
  if (!players.length) {
    container.innerHTML = '<span style="color:#446;font-size:0.75rem;font-family:Roboto Condensed,sans-serif;">Add players to award points</span>';
    return;
  }
  players.forEach(p => {
    const row = document.createElement('div');
    row.className = 'award-row';
    const name = document.createElement('span');
    name.className = 'award-name';
    name.textContent = p.name;
    const correct = document.createElement('button');
    correct.className = 'award-btn correct';
    correct.textContent = `+$${val.toLocaleString()}`;
    correct.onclick = (e) => {
      adjustScore(p.name, val);
      showScorePop(val, e.clientX, e.clientY);
      soundCorrect();
      launchConfetti();
      closeModal();
    };
    const wrong = document.createElement('button');
    wrong.className = 'award-btn wrong';
    wrong.textContent = `-$${val.toLocaleString()}`;
    wrong.onclick = (e) => {
      adjustScore(p.name, -val);
      showScorePop(-val, e.clientX, e.clientY);
      soundWrong();
    };
    row.append(name, correct, wrong);
    container.appendChild(row);
  });
}

document.getElementById('reveal-btn').onclick = () => {
  soundReveal();
  document.getElementById('modal-answer').classList.add('visible');
  document.getElementById('award-section').classList.add('visible');
  document.getElementById('reveal-btn').style.display = 'none';
};
document.getElementById('close-btn').onclick = closeModal;

function closeModal() {
  if (currentClue) {
    usedCells[currentClue.key] = true;
    save(); buildBoard();
  }
  currentClue = null;
  document.getElementById('overlay').classList.remove('open');
}
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

// ── Daily Double ──
function showDailyDouble(cb) {
  const dd = document.getElementById('dd-overlay');
  dd.classList.add('open');
  const dismiss = () => { dd.classList.remove('open'); dd.removeEventListener('click', dismiss); cb(); };
  setTimeout(() => dd.addEventListener('click', dismiss), 400);
}

// ── Players ──
function renderPlayers() {
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  players.forEach(p => {
    const row = document.createElement('div');
    row.className = 'player-row' + (p.name === activePlayer ? ' active-player' : '');
    const name = document.createElement('div');
    name.className = 'player-name';
    name.textContent = p.name;
    name.title = 'Set as active player';
    name.onclick = () => { activePlayer = p.name; save(); renderPlayers(); };
    const score = document.createElement('div');
    score.className = 'player-score' + (p.score < 0 ? ' negative' : '');
    score.textContent = `$${Math.abs(p.score).toLocaleString()}`;
    if (p.score < 0) score.textContent = `-$${Math.abs(p.score).toLocaleString()}`;
    const plus = document.createElement('button');
    plus.className = 'score-btn'; plus.textContent = '+'; plus.title = 'Add 100';
    plus.onclick = () => adjustScore(p.name, 100);
    const minus = document.createElement('button');
    minus.className = 'score-btn'; minus.textContent = '−'; minus.title = 'Subtract 100';
    minus.onclick = () => adjustScore(p.name, -100);
    const del = document.createElement('button');
    del.className = 'score-btn del-btn'; del.textContent = '×'; del.title = 'Remove';
    del.onclick = () => {
      if (confirm(`Remove ${p.name}?`)) {
        players = players.filter(x => x.name !== p.name);
        if (activePlayer === p.name) activePlayer = null;
        save(); renderPlayers();
      }
    };
    row.append(name, score, plus, minus, del);
    list.appendChild(row);
  });
}

function adjustScore(name, delta) {
  const p = players.find(x => x.name === name);
  if (p) { p.score += delta; save(); renderPlayers(); }
}

document.getElementById('add-player-btn').onclick = addPlayer;
document.getElementById('player-name-input').addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });
function addPlayer() {
  const inp = document.getElementById('player-name-input');
  const name = inp.value.trim();
  if (!name) return;
  if (players.find(p => p.name === name)) { alert('Name already in use.'); return; }
  players.push({ name, score: 0 });
  if (!activePlayer) activePlayer = name;
  inp.value = '';
  save(); renderPlayers();
  if (currentClue) buildAwardButtons(currentClue.val);
}

// ── Reset ──
document.getElementById('reset-btn').onclick = () => {
  if (confirm('Reset the board? Scores are kept.')) { usedCells = {}; save(); buildBoard(); }
};

// ── Edit Modal ──
document.getElementById('edit-btn').onclick = openEdit;
document.getElementById('edit-cancel-btn').onclick = () => document.getElementById('edit-overlay').classList.remove('open');

function openEdit() {
  const form = document.getElementById('edit-form');
  form.innerHTML = '';
  gameData.categories.forEach((cat, ci) => {
    const block = document.createElement('div');
    block.className = 'edit-category-block';
    block.innerHTML = `<label>Category ${ci+1} Name</label>`;
    const catInput = document.createElement('input');
    catInput.type = 'text'; catInput.value = cat.name;
    catInput.className = 'cat-name-input'; catInput.dataset.ci = ci;
    block.appendChild(catInput);
    const colLabels = document.createElement('div');
    colLabels.className = 'edit-col-labels';
    colLabels.innerHTML = '<div class="edit-col-label">Value</div><div class="edit-col-label">Clue (read aloud)</div><div class="edit-col-label">Answer</div><div class="edit-col-label">Daily Double?</div>';
    block.appendChild(colLabels);
    cat.clues.forEach((clue, ri) => {
      const row = document.createElement('div');
      row.className = 'edit-row';
      const val = document.createElement('span'); val.textContent = `$${VALUES[ri]}`;
      const qIn = document.createElement('input'); qIn.type='text'; qIn.value=clue.q; qIn.placeholder='Clue...'; qIn.className='clue-q-input'; qIn.dataset.ci=ci; qIn.dataset.ri=ri;
      const aIn = document.createElement('input'); aIn.type='text'; aIn.value=clue.a; aIn.placeholder='Answer...'; aIn.className='clue-a-input'; aIn.dataset.ci=ci; aIn.dataset.ri=ri;
      const dd = document.createElement('select'); dd.className='clue-dd-input'; dd.dataset.ci=ci; dd.dataset.ri=ri;
      dd.innerHTML = '<option value="0">No</option><option value="1">Yes</option>';
      dd.value = clue.dd ? '1' : '0';
      row.append(val, qIn, aIn, dd);
      block.appendChild(row);
    });
    form.appendChild(block);
  });
  document.getElementById('edit-overlay').classList.add('open');
}

document.getElementById('edit-save-btn').onclick = () => {
  document.querySelectorAll('.cat-name-input').forEach(inp => {
    gameData.categories[+inp.dataset.ci].name = inp.value.trim() || gameData.categories[+inp.dataset.ci].name;
  });
  document.querySelectorAll('.clue-q-input').forEach(inp => {
    gameData.categories[+inp.dataset.ci].clues[+inp.dataset.ri].q = inp.value.trim();
  });
  document.querySelectorAll('.clue-a-input').forEach(inp => {
    gameData.categories[+inp.dataset.ci].clues[+inp.dataset.ri].a = inp.value.trim();
  });
  document.querySelectorAll('.clue-dd-input').forEach(sel => {
    gameData.categories[+sel.dataset.ci].clues[+sel.dataset.ri].dd = sel.value === '1';
  });
  save(); buildBoard();
  document.getElementById('edit-overlay').classList.remove('open');
};

// ── Three.js Host Character ──
(function() {
  const canvas = document.getElementById('host-canvas');
  const panel  = document.getElementById('host-panel');

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050f07);
  scene.fog = new THREE.FogExp2(0x060f08, 0.06);

  const camera = new THREE.PerspectiveCamera(48, 1, 0.1, 80);
  camera.position.set(0, 1.8, 5.5);
  camera.lookAt(0, 1.6, 0);

  // Lights
  scene.add(new THREE.AmbientLight(0x203030, 1.2));
  const keyLight = new THREE.DirectionalLight(0xfff5e0, 1.6);
  keyLight.position.set(2, 5, 4);
  keyLight.castShadow = true;
  scene.add(keyLight);
  const fillLight = new THREE.DirectionalLight(0x204060, 0.6);
  fillLight.position.set(-3, 2, 2);
  scene.add(fillLight);
  const rimLight = new THREE.DirectionalLight(0x7ec87e, 0.4);
  rimLight.position.set(0, 3, -4);
  scene.add(rimLight);

  // Ground
  const ground = new THREE.Mesh(
    new THREE.CircleGeometry(8, 32),
    new THREE.MeshLambertMaterial({ color: 0x081208 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Background pine trees
  const treeMat  = new THREE.MeshLambertMaterial({ color: 0x0c300c });
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x2a1505 });
  [[-3,0,-5,1.2,2.2],[3,0,-5,1.0,2.0],[-1.8,0,-6,1.5,2.6],[1.8,0,-6,1.3,2.4],[-4.2,0,-5.5,0.9,1.8],[4.2,0,-5,0.8,1.6]].forEach(([x,y,z,s,h]) => {
    const t = new THREE.Mesh(new THREE.ConeGeometry(s*0.7, h, 7), treeMat);
    t.position.set(x, h/2, z); scene.add(t);
    const tr = new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.09,0.5,6), trunkMat);
    tr.position.set(x, -0.1, z); scene.add(tr);
  });

  // Stars
  const sv = [];
  for (let i=0;i<250;i++) sv.push((Math.random()-.5)*40, Math.random()*14+3, (Math.random()-.5)*20-4);
  const sg = new THREE.BufferGeometry();
  sg.setAttribute('position', new THREE.Float32BufferAttribute(sv,3));
  scene.add(new THREE.Points(sg, new THREE.PointsMaterial({ color:0xaaccff, size:0.09 })));

  // Load host GLB
  let mixer = null;
  let idleAction = null;

  const loader = new THREE.GLTFLoader();
  loader.load('./host.glb',
    (gltf) => {
      const model = gltf.scene;

      // Center and scale to fit panel nicely
      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3();
      box.getSize(size);
      const center = new THREE.Vector3();
      box.getCenter(center);

      const targetH = 3.2;
      const scale = targetH / size.y;
      model.scale.setScalar(scale);
      model.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);
      model.rotation.y = Math.PI; // face camera

      model.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });

      scene.add(model);

      // Play idle animation if present
      if (gltf.animations && gltf.animations.length > 0) {
        mixer = new THREE.AnimationMixer(model);
        const clip = gltf.animations.find(a => a.name === 'Idle') || gltf.animations[0];
        idleAction = mixer.clipAction(clip);
        idleAction.setLoop(THREE.LoopRepeat, Infinity);
        idleAction.play();
      }

      document.getElementById('host-label').textContent = 'Your Host';
    },
    undefined,
    (err) => { console.warn('GLB load error:', err); }
  );

  // Resize
  function resize() {
    const w = panel.clientWidth, h = panel.clientHeight;
    if (!w || !h) return;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  new ResizeObserver(resize).observe(panel);
  resize();

  // Animate
  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    if (mixer) mixer.update(delta);
    renderer.render(scene, camera);
  }
  animate();
})();

// ── Init ──
load();
buildBoard();
renderPlayers();
</script>
</body>
</html>
